<!doctype html>
<!--
  Daedalus template: onepager
  ===========================
  Letter-portrait one-pager. Hero photo + headline + 3-column proof grid + CTA.
  Good default for product overviews, exec summaries, sales handouts.

  USAGE: see blank.html. Same pattern — replace {{TOKEN}} placeholders and
  inline editor blocks via the DAE_*_HERE markers.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ONEPAGER_TITLE}}</title>
<style>
:root {
  --dae-primary: #1a1a1a;
  --dae-secondary: #4a4a4a;
  --dae-accent: #0066cc;
  --dae-warm: #cc3300;
  --dae-tint-1: #cce0ff;
  --dae-tint-2: #d8d8d8;
  --dae-tint-3: #ececec;
  --dae-tint-4: #f6f6f6;
  --dae-bg: #ffffff;
  --dae-fg: #1a1a1a;
}

@page { size: Letter portrait; margin: 0.5in; }
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #f0f0f0; }
body {
  font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  color: var(--dae-fg);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.onepager {
  width: 7.5in;
  min-height: 10in;
  margin: 0.5in auto;
  padding: 0.4in;
  background: var(--dae-bg);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
}

.op-header { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 0.15in; border-bottom: 2px solid var(--dae-accent); margin-bottom: 0.3in; }
.op-header h2 { margin: 0; font-size: 18px; font-weight: 700; color: var(--dae-primary); }
.op-meta { font-family: ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dae-secondary); }

.op-hero { margin-bottom: 0.35in; }
.op-hero h1 { font-size: 36px; line-height: 1.05; color: var(--dae-primary); margin: 0 0 0.15in; font-weight: 800; }
.op-hero .subhead { font-size: 15px; line-height: 1.45; color: var(--dae-secondary); margin: 0 0 0.2in; }
.op-hero-photo { width: 100%; height: 2.0in; object-fit: cover; border-radius: 8px; display: block; }

.op-proof { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.18in; margin-bottom: 0.35in; }
.proof-tile { background: var(--dae-tint-4); border: 1.5px solid var(--dae-tint-2); border-radius: 8px; padding: 0.2in; page-break-inside: avoid; }
.proof-tile.accent { background: var(--dae-primary); border-color: var(--dae-primary); }
.proof-tile.accent .proof-stat, .proof-tile.accent .proof-label { color: white; }
.proof-stat { font-size: 32px; font-weight: 800; color: var(--dae-accent); margin: 0 0 0.08in; line-height: 1; }
.proof-label { font-size: 12px; color: var(--dae-secondary); margin: 0; line-height: 1.35; }

.op-cta { background: var(--dae-primary); border-radius: 10px; padding: 0.2in 0.25in; display: grid; grid-template-columns: 1.4fr auto; gap: 0.25in; align-items: center; margin-bottom: 0.25in; }
.op-cta h2 { font-size: 20px; font-weight: 700; color: white; margin: 0 0 0.06in; }
.op-cta p { font-size: 13px; color: rgba(255,255,255,0.9); margin: 0; }
.op-cta-action { background: var(--dae-warm); color: white; font-weight: 600; font-size: 14px; padding: 0.12in 0.22in; border-radius: 999px; text-decoration: none; white-space: nowrap; display: inline-block; }

.op-footer { border-top: 1.5px solid var(--dae-tint-2); padding-top: 0.1in; font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--dae-secondary); text-align: center; letter-spacing: 0.04em; }

/* Themed text colors (for the toolbar's 4 swatches) */
.dae-color-1 { color: var(--dae-primary); }
.dae-color-2 { color: var(--dae-secondary); }
.dae-color-3 { color: var(--dae-accent); }
.dae-color-4 { color: var(--dae-warm); }

.dae-photo-wrap { display: block; position: relative; }

@media print {
  html, body { background: white !important; }
  body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .onepager { width: auto; min-height: 0; margin: 0; padding: 0; box-shadow: none; }
  .proof-tile, .op-cta, .op-hero { page-break-inside: avoid; break-inside: avoid; }
}

/* DAE_EDIT_CSS_HERE */
</style>
</head>
<body>

<article class="onepager dae-sortable-container" data-pdf-root>

  <header class="op-header">
    <h2 data-editable>{{BRAND_NAME}}</h2>
    <span class="op-meta" data-editable>v1 · 2026</span>
  </header>

  <section class="op-hero">
    <h1 data-editable>{{HERO_CLAIM}}</h1>
    <p class="subhead" data-editable>{{SUBHEAD}}</p>
    <span class="dae-photo-wrap">
      <img src="{{HERO_PHOTO_BASE64}}" alt="{{HERO_PHOTO_ALT}}" class="op-hero-photo" data-editable-photo>
    </span>
  </section>

  <section class="op-proof dae-sortable-container" aria-label="Proof points">
    <div class="proof-tile">
      <p class="proof-stat" data-editable>{{PROOF_1_STAT}}</p>
      <p class="proof-label" data-editable>{{PROOF_1_LABEL}}</p>
    </div>
    <div class="proof-tile accent">
      <p class="proof-stat" data-editable>{{PROOF_2_STAT}}</p>
      <p class="proof-label" data-editable>{{PROOF_2_LABEL}}</p>
    </div>
    <div class="proof-tile">
      <p class="proof-stat" data-editable>{{PROOF_3_STAT}}</p>
      <p class="proof-label" data-editable>{{PROOF_3_LABEL}}</p>
    </div>
  </section>

  <div class="op-cta">
    <div>
      <h2 data-editable>{{CTA_HEADLINE}}</h2>
      <p data-editable>{{CTA_BODY}}</p>
    </div>
    <a href="{{CTA_LINK}}" class="op-cta-action" data-editable>{{CTA_ACTION}}</a>
  </div>

  <footer class="op-footer">
    <span data-editable>{{FOOTER_TEXT}}</span>
  </footer>

</article>

<!-- DAE_EDIT_TOOLBAR_HERE -->

<script>

</body>
</html>
